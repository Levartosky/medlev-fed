<!doctype html>

<html lang="en">

<head>

  <!--
  ========================================================
  CONFIGURAÇÕES BÁSICAS DA PÁGINA
  ========================================================
  -->

  <meta charset="utf-8">

  <title>MedLev</title>

  <base href="/">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <!--
  ========================================================
  FAVICON DA APLICAÇÃO
  ========================================================
  -->

  <link
    rel="icon"
    type="image/x-icon"
    href="favicon.ico"
  >

  <!--
  ========================================================
  MATERIAL SYMBOLS
  ========================================================

  Biblioteca oficial de ícones do Google.

  Responsável pelos ícones:
  - home
  - apartment
  - store
  - arrows
  - icons gerais do sistema

  Sem essa importação:
  os ícones aparecem como TEXTO.
  ========================================================
  -->

  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
  >

  <!--
  ========================================================
  FONTES — PÁGINA DE SERVIÇOS
  ========================================================

  Plus Jakarta Sans: títulos e números da tela de serviços.
  Manrope: corpo de texto da tela de serviços.
  ========================================================
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <!--
  ========================================================
  ROOT DA APLICAÇÃO ANGULAR
  ========================================================

  O Angular renderiza toda SPA aqui dentro.
  ========================================================
  -->

  <app-root></app-root>

</body>

</html>
