<!--
========================================================
FORMULÁRIO MEDLEV
========================================================

Etapa 1:
Dados de contato.

Objetivo:
capturar lead inicial.
========================================================
-->

<div class="quote-form">

  <!--
  ========================================================
  HEADER
  ========================================================
  -->
  <header class="quote-form__header">

    <!-- Marca -->
    <div class="quote-form__brand">

      <!-- Logo -->
      <img
        src="/logo-medlev.png"
        alt="Logo MedLev"
        class="quote-form__logo"
      >

      <!-- Textos -->
      <div class="quote-form__brand-text">

        <h1>MedLev</h1>

        <span>arquitetura</span>

      </div>

    </div>

    <!-- Suporte -->
    <div class="quote-form__support">

      <span>
        Precisa de ajuda?
      </span>

      <a href="#">

        <span class="material-symbols-outlined">
          chat
        </span>

        Falar no WhatsApp

      </a>

    </div>

  </header>

  <!--
  ========================================================
  STEPPER
  ========================================================
  -->
  <section class="quote-form__steps">

    <!-- Contato -->
    <div class="step step--active">

      <div class="step__circle">
        1
      </div>

      <span>Contato</span>

    </div>

    <!-- Imóvel -->
    <div class="step">

      <div class="step__circle">
        2
      </div>

      <span>Imóvel</span>

    </div>

    <!-- Escopo -->
    <div class="step">

      <div class="step__circle">
        3
      </div>

      <span>Escopo</span>

    </div>

    <!-- Entregáveis -->
    <div class="step">

      <div class="step__circle">
        4
      </div>

      <span>Entregáveis</span>

    </div>

    <!-- Finalização -->
    <div class="step">

      <div class="step__circle">
        5
      </div>

      <span>Finalização</span>

    </div>

  </section>

  <!--
  ========================================================
  CONTEÚDO
  ========================================================
  -->
  <main class="quote-form__content">

    <h2>
      Dados de contato para envio do orçamento
    </h2>

    <p>
      Informe como podemos te retornar com a proposta.
    </p>

    <!-- FORM -->
    <form class="quote-form__form">

      <!-- Nome -->
      <div class="form-group">

        <label>
          Nome / Empresa *
        </label>

        <input
          type="text"
          placeholder="Estúdio Moraes Arquitetura"
        >

      </div>

      <!-- WhatsApp -->
      <div class="form-group">

        <label>
          WhatsApp *
        </label>

        <input
          type="text"
          placeholder="(11) 99999-9999"
        >

      </div>

    </form>

  </main>

  <!--
  ========================================================
  FOOTER ACTIONS
  ========================================================
  -->
  <footer class="quote-form__footer">

    <!-- Voltar -->
    <button
      class="secondary-button"
      (click)="previousStep()"
    >

      ← Voltar

    </button>

    <!-- Próxima -->
    <button
      class="primary-button"
      (click)="nextStep()"
    >

      Próxima etapa →

    </button>

  </footer>

</div>
